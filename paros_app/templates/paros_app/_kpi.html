<div class="card" style="padding:18px 20px;">
    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div>
            <div style="font-size:11px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px;">
                {{ label }}
            </div>
            <div style="font-size:28px; font-weight:700; color:{{ color }}; line-height:1;">
                {{ valor }}{% if sufijo %}<span style="font-size:14px; font-weight:500; color:var(--text-3); margin-left:3px;">{{ sufijo }}</span>{% endif %}
            </div>
        </div>
        <div style="width:36px; height:36px; border-radius:8px; background:{{ color }}1a;
                    display:flex; align-items:center; justify-content:center; flex-shrink:0;">
            <svg width="18" height="18" fill="none" stroke="{{ color }}" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="{{ icon }}"/>
            </svg>
        </div>
    </div>
</div>
