<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar sesión || Gestión de Paros</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #F8F7FF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-wrap {
            display: flex;
            width: 100%;
            max-width: 860px;
            background: #fff;
            border-radius: 16px;
            border: 1px solid #E5E4F0;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(79,70,229,.1);
        }

        /* Panel izquierdo decorativo */
        .login-panel {
            width: 340px;
            background: #4F46E5;
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .panel-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .panel-brand-dot {
            width: 10px; height: 10px;
            background: #A5B4FC;
            border-radius: 50%;
        }
        .panel-brand span {
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: .04em;
        }

        .panel-body h2 {
            color: #fff;
            font-size: 26px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 12px;
        }
        .panel-body p {
            color: #C7D2FE;
            font-size: 14px;
            line-height: 1.7;
        }

        .panel-dots {
            display: flex;
            gap: 6px;
        }
        .panel-dots span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,.3);
        }
        .panel-dots span:first-child { background: #fff; }

        /* Panel derecho: formulario */
        .login-form-wrap {
            flex: 1;
            padding: 48px 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-form-wrap h3 {
            font-size: 20px;
            font-weight: 600;
            color: #1E1B4B;
            margin-bottom: 6px;
        }
        .login-form-wrap p {
            font-size: 13.5px;
            color: #9CA3AF;
            margin-bottom: 30px;
        }

        .form-field {
            margin-bottom: 18px;
        }
        .form-field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #6B7280;
            letter-spacing: .04em;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .form-field input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #E5E4F0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            color: #1E1B4B;
            background: #fff;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }
        .form-field input:focus {
            border-color: #4F46E5;
            box-shadow: 0 0 0 3px rgba(79,70,229,.1);
        }

        .error-msg {
            background: #FEE2E2;
            color: #991B1B;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .btn-login {
            width: 100%;
            background: #4F46E5;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
            margin-top: 8px;
        }
        .btn-login:hover { background: #3730A3; }

        @media (max-width: 640px) {
            .login-panel { display: none; }
            .login-form-wrap { padding: 36px 28px; }
        }
    </style>
</head>
<body>
    <div class="login-wrap">

        <div class="login-panel">
            <div class="panel-brand">
                <div class="panel-brand-dot"></div>
                <span>Gestión de Paros</span>
            </div>
            <div class="panel-body">
                <h2>Control de paros de producción</h2>
                <p>Registra, consulta y analiza los paros por área, turno y tiempo de manera rápida.</p>
            </div>
            <div class="panel-dots">
                <span></span><span></span><span></span><span></span>
            </div>
        </div>

        <div class="login-form-wrap">
            <h3>Bienvenido</h3>
            <p>Ingresa tus credenciales para continuar</p>

            {% if form.errors %}
            <div class="error-msg">Usuario o contraseña incorrectos. Inténtalo de nuevo.</div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-field">
                    <label for="id_username">Usuario</label>
                    <input type="text" name="username" id="id_username" required autofocus autocomplete="username">
                </div>
                <div class="form-field">
                    <label for="id_password">Contraseña</label>
                    <div style="position:relative;">
                        <input type="password" name="password" id="id_password" required autocomplete="current-password" style="padding-right:42px;width:100%;box-sizing:border-box;">
                        <button type="button" id="toggle-pwd"
                                onclick="togglePwd()"
                                style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:#9CA3AF;display:flex;align-items:center;">
                            <svg id="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg id="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <script>
                function togglePwd() {
                    var input = document.getElementById('id_password');
                    var eyeOn  = document.getElementById('icon-eye');
                    var eyeOff = document.getElementById('icon-eye-off');
                    if (input.type === 'password') {
                        input.type = 'text';
                        eyeOn.style.display  = 'none';
                        eyeOff.style.display = 'block';
                    } else {
                        input.type = 'password';
                        eyeOn.style.display  = 'block';
                        eyeOff.style.display = 'none';
                    }
                }
                </script>
                <input type="hidden" name="next" value="{{ next }}">
                <button type="submit" class="btn-login">Entrar</button>
            </form>
        </div>

    </div>
</body>
</html>
