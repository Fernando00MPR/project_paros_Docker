services:

  # ── Base de datos PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - paros_postgres_data:/var/lib/postgresql/data
    # ✅ Sin exposición de puertos: la DB solo es accesible dentro de la red Docker
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Aplicación Django ────────────────────────────────────────────────────────
  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn paros_project.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      # ✅ Sin montaje de código local (./:/app) — el código viene del build
      - paros_static_volume:/app/staticfiles
    # ✅ Sin exposición directa al host — Nginx es el único punto de entrada
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy

  # ── Nginx (proxy reverso + archivos estáticos) ───────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      # ✅ Solo Nginx expone puerto al exterior
      - "8080:80"
    volumes:
      - paros_static_volume:/app/staticfiles
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

# ✅ Nombres únicos de volúmenes para evitar colisiones entre proyectos
volumes:
  paros_postgres_data:
  paros_static_volume:
